# OPSQAI Self-Hosted — reference docker-compose topology (Phase 5).
#
# Boots the app + PostgreSQL + MinIO on a private network. All secrets come
# from `docker/.env` (never committed). The `opsqai` service reports its
# INSTALLER_VERSION on every heartbeat to the configured license server.

services:
  opsqai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        INSTALLER_VERSION: ${INSTALLER_VERSION:-1.0.0}
    image: opsqai/app:${INSTALLER_VERSION:-1.0.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      OPSQAI_MODE: selfhost
      INSTALLER_VERSION: ${INSTALLER_VERSION:-1.0.0}
      OPSQAI_INSTALL_ID: ${OPSQAI_INSTALL_ID}
      # Database
      DATABASE_URL: postgres://opsqai:${POSTGRES_PASSWORD}@postgres:5432/opsqai
      # Object storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: opsqai
      # AI provider — pick one; defaults to Lovable Gateway proxy
      AI_PROVIDER: ${AI_PROVIDER:-lovable}
      # License server (for heartbeat + revocation checks)
      OPSQAI_LICENSE_SERVER_URL: ${OPSQAI_LICENSE_SERVER_URL}
      # Public URL of this install (used in emails, OAuth callbacks)
      OPSQAI_PUBLIC_URL: ${OPSQAI_PUBLIC_URL}
    ports:
      - "${OPSQAI_PORT:-3000}:3000"
    networks: [opsqai-net]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opsqai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: opsqai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsqai -d opsqai"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [opsqai-net]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [opsqai-net]

volumes:
  postgres-data:
  minio-data:

networks:
  opsqai-net:
    driver: bridge
