<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <title>OPSQAI — Not Ready</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #101a2e;
        --fg: #e6edf7;
        --muted: #94a3b8;
        --gold: #c9a24c;
        --danger: #ef4444;
        --ok: #22c55e;
        --line: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg); color: var(--fg);
        font-family: "Segoe UI", "Space Grotesk", system-ui, sans-serif;
      }
      main {
        max-width: 780px; margin: 0 auto; padding: 56px 40px;
      }
      h1 { margin: 0 0 8px; font-size: 26px; font-weight: 600; }
      .lead { color: var(--muted); margin: 0 0 28px; line-height: 1.55; }
      .card {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 12px; padding: 20px 22px; margin-bottom: 18px;
      }
      .card h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
      .svc { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
      .svc:last-child { border-bottom: 0; }
      .state { font-family: ui-monospace, Consolas, monospace; font-size: 12px; padding: 2px 8px; border-radius: 999px; }
      .state.RUNNING { background: rgba(34,197,94,0.12); color: var(--ok); }
      .state.STOPPED, .state.STOP_PENDING { background: rgba(239,68,68,0.12); color: var(--danger); }
      .state.UNKNOWN, .state.START_PENDING { background: rgba(148,163,184,0.15); color: var(--muted); }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
      button {
        appearance: none; border: 1px solid var(--line); background: transparent;
        color: var(--fg); padding: 10px 16px; border-radius: 8px; font-size: 14px;
        cursor: pointer; font-family: inherit;
      }
      button.primary { background: var(--gold); color: #0b1220; border-color: var(--gold); font-weight: 600; }
      button:hover { border-color: var(--gold); }
      details { color: var(--muted); font-size: 13px; margin-top: 20px; }
      details pre {
        background: #06101d; border: 1px solid var(--line); border-radius: 8px;
        padding: 12px; overflow: auto; color: var(--fg); font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OPSQAI is not ready yet</h1>
      <p class="lead" id="lead">The desktop app could not reach the local OPSQAI service. This usually means one or more Windows services haven't finished starting, or a component failed to start.</p>

      <div class="card">
        <h2>Local services</h2>
        <div id="services"></div>
        <div class="actions" style="margin-top: 14px;">
          <button class="primary" id="btn-start">Start services &amp; retry</button>
          <button id="btn-retry">Retry now</button>
          <button id="btn-logs">Open logs folder</button>
          <button id="btn-quit">Quit</button>
        </div>
      </div>

      <details id="diag">
        <summary>Diagnostics</summary>
        <pre id="diag-body"></pre>
      </details>
    </main>
    <script>
      const state = (() => {
        try {
          return JSON.parse(atob(location.hash.replace(/^#/, ""))) || {};
        } catch (_) { return {}; }
      })();

      function renderServices(list) {
        const el = document.getElementById("services");
        el.innerHTML = "";
        (list || state.services || []).forEach((s) => {
          const row = document.createElement("div");
          row.className = "svc";
          row.innerHTML = `<span>${s.name}</span><span class="state ${s.state}">${s.state}</span>`;
          el.appendChild(row);
        });
      }
      renderServices();

      document.getElementById("diag-body").textContent =
        `URL: ${state.url || ""}\nCode: ${state.code || ""}\nDescription: ${state.description || ""}\nLog file: ${state.logFile || ""}`;

      const api = window.opsqai || {};

      document.getElementById("btn-start").addEventListener("click", async () => {
        document.getElementById("btn-start").disabled = true;
        document.getElementById("btn-start").textContent = "Starting…";
        try {
          await api.startServices?.();
          const svc = await api.getServices?.();
          renderServices(svc);
          await new Promise((r) => setTimeout(r, 1500));
          api.retry?.();
        } catch (e) {
          document.getElementById("btn-start").disabled = false;
          document.getElementById("btn-start").textContent = "Start services & retry";
        }
      });
      document.getElementById("btn-retry").addEventListener("click", () => api.retry?.());
      document.getElementById("btn-logs").addEventListener("click", () => api.openLogs?.());
      document.getElementById("btn-quit").addEventListener("click", () => api.quit?.());
    </script>
  </body>
</html>
