<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>OPSQAI — Starting</title>
    <style>
      :root {
        --bg: #0b1220;
        --fg: #e6edf7;
        --muted: #94a3b8;
        --gold: #c9a24c;
        --line: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: var(--bg); color: var(--fg);
        font-family: "Segoe UI", "Space Grotesk", system-ui, -apple-system, sans-serif;
        overflow: hidden;
        -webkit-user-select: none; user-select: none;
      }
      main {
        height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 32px;
        text-align: center;
      }
      .brand {
        font-size: 34px; font-weight: 600; letter-spacing: 0.02em;
        margin-bottom: 6px;
      }
      .brand span { color: var(--gold); }
      .tagline {
        color: var(--muted); font-size: 13px; margin-bottom: 40px;
      }
      .status {
        font-size: 14px; color: var(--fg);
        margin-bottom: 18px; min-height: 20px;
      }
      .bar {
        width: 320px; height: 4px; border-radius: 999px;
        background: var(--line); overflow: hidden; position: relative;
      }
      .bar::after {
        content: ""; position: absolute; inset: 0;
        width: 40%; background: linear-gradient(90deg, transparent, var(--gold), transparent);
        animation: slide 1.4s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
      .meta {
        margin-top: 22px; font-size: 11px; color: var(--muted);
        letter-spacing: 0.05em; text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">OPS<span>QAI</span></div>
      <div class="tagline">Self-Hosted Platform</div>
      <div class="status" id="status">Starting OPSQAI…</div>
      <div class="bar" aria-hidden="true"></div>
      <div class="meta" id="meta"></div>
    </main>
    <script>
      const $status = document.getElementById("status");
      const $meta = document.getElementById("meta");
      if (window.opsqai) {
        window.opsqai.onStatus((text) => { $status.textContent = text; });
        window.opsqai.onProgress((p) => {
          if (!p) return;
          $meta.textContent = `Attempt ${p.attempt} · ${p.elapsed}s elapsed`;
        });
      }
    </script>
  </body>
</html>
