# GitHub Actions workflow — signed Windows installer build.
#
# Self-hosted Windows runner prerequisites (verified once at provisioning):
#   - Windows 10/11 or Server 2022, PowerShell 7+
#   - Node.js 20.x LTS + npm on PATH (for `build:selfhosted` + Electron packager)
#   - NSIS 3.09+ (makensis.exe at %ProgramFiles(x86)%\NSIS\)
#   - NSIS **EnVar plugin** installed under %ProgramFiles(x86)%\NSIS\Plugins\x86-unicode\
#     (download: https://nsis.sourceforge.io/EnVar_plug-in)
#   - Windows 10/11 SDK (signtool.exe on PATH)
#   - openssl.exe on PATH (only for dev builds without a real updater pubkey)
#   - EV code-signing token/HSM plugged in and unlocked in the runner session
#   - Secret file provisioned at
#     opsqai-windows\payload\updater\pubkey.pem  (production Ed25519 public key,
#     never committed — restored from GH Actions secret before build.ps1 runs).


name: build-windows-installer

on:
  push:
    tags: ['win-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (e.g. 1.0.0)'
        required: true
      sign:
        description: 'Sign the installer'
        type: boolean
        default: true

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, windows, opsqai-signing]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ inputs.version }}'
          if (-not $v) { $v = ('${{ github.ref_name }}' -replace '^win-v','') }
          if (-not $v) { $v = '0.0.0-dev' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore updater public key
        shell: pwsh
        working-directory: opsqai-windows
        env:
          OPSQAI_UPDATER_PUBKEY: ${{ secrets.OPSQAI_UPDATER_PUBKEY }}
        run: |
          if (-not $env:OPSQAI_UPDATER_PUBKEY) { throw "OPSQAI_UPDATER_PUBKEY secret is not set" }
          New-Item -ItemType Directory -Force -Path payload\updater | Out-Null
          $env:OPSQAI_UPDATER_PUBKEY | Set-Content -Path payload\updater\pubkey.pem -Encoding ascii

      - name: Build installer
        shell: pwsh
        working-directory: opsqai-windows
        run: |
          $signFlag = @()
          if ('${{ inputs.sign }}' -ne 'false') { $signFlag = @('-Sign') }
          pwsh ./build/build.ps1 -Configuration Release -Version '${{ steps.ver.outputs.version }}' @signFlag

      - name: Verify signature
        shell: pwsh
        run: signtool verify /pa /v opsqai-windows/build/artifacts/OPSQAI-Setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPSQAI-Setup-${{ steps.ver.outputs.version }}
          path: opsqai-windows/build/artifacts/OPSQAI-Setup.exe
          if-no-files-found: error
